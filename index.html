<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordMint</title>
    <link rel="icon" href="" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="global.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="text-[var(--text)] bg-[#EBF4F6] min-h-screen">
    <nav
      class="p-8 border-b shadow-md h-20 flex justify-between bg-gradient-to-r from-[#6057E3] to-[#575EE2] w-full"
    >
      <h1 class="italic text-4xl font-bold text-[var(--text)]">WordMint.</h1>

      <!--       <a href="/history.html"
        ><button
          class="border border-[#85C79A] px-4 py-1 rounded text-[var(--subtext)] hover:bg-blue-200 hover:text-blue-800 transition-colors duration-300"
        >
          History
        </button></a
      > -->
    </nav>
    <div
      class="max-w-3xl mx-auto shadow-lg rounded-lg p-8 mt-12 bg-gradient-to-r from-[#6057E3] to-[#575EE2] min-h-[400px]"
    >
      <div id="search-container" class="flex flex-col items-center">
        <div
          class="border border-blue-700 max-w-xs rounded-full py-1 px-3 mt-8 mx-auto flex items-center justify-between bg-white"
          id="search-box"
        >
          <input
            placeholder="Search word.."
            class="bg-transparent focus:outline-none focus:none text-gray-700 w-full"
            type="text"
            id="search"
          />
          <button
            id="search-button"
            class="hover:bg-gradient-to-r from-[#6057E3] to-[#575EE2] text-blue-500 hover:text-[var(--text)] transition-colors duration-300 px-1.5 py-1 rounded-full"
            onclick="fetchDefinitions()"
          >
            <i class="fas fa-search"></i>
          </button>
        </div>
      </div>
      <!---------------Word of the day container--------------------->
      <div class="flex items-center justify-center mt-8" id="word-of-the-day">
        <h2 class="text-2xl font-bold underline">Word Of The Day</h2>
      </div>

      <div class="flex flex-col items-center mt-8" id="result"></div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
