<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordMint</title>
    <link rel="icon" href="" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="global.css" />
  </head>
  <body class="bg-[var(--background)] text-[var(--text)]">
    <nav class="p-8 border-b shadow-md h-20 flex justify-between w-full">
      <h1 class="italic text-4xl font-bold text-[var(--text)]">WordMint.</h1>

      <a href="/history.html"
        ><button
          class="bg-[var(--primary)] px-4 py-1 rounded text-white hover:bg-blue-200 hover:text-blue-800 transition-colors duration-300"
        >
          History
        </button></a
      >
    </nav>
    <div id="search-container" class="flex flex-col items-center">
      <div
        class="border border-gray-700 max-w-xs rounded-lg p-2 mt-8 mx-auto flex items-center justify-between"
        id="search-box"
      >
        <input
          placeholder="Search word.."
          class="bg-transparent focus:outline-none focus:none"
          type="text"
          id="search"
        />
        <button id="search-button" onclick="fetchDefinitions()">Search</button>
      </div>
    </div>
    <!---------------Word of the day container--------------------->
    <div class="flex items-center justify-center mt-8" id="word-of-the-day">
      <h2 class="text-2xl font-bold text-[var(--primary)] underline">
        Word Of The Day
      </h2>
    </div>

    <div class="flex flex-col items-center mt-8" id="result"></div>
  </body>
  <script src="/script.js"></script>
</html>
